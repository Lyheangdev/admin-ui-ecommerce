name: learn github action
run-name: ${{github.actor}} is learning github action
on:
  push:
    branches: [main]
jobs:
  do-something-smart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm -v 
      - run: echo "done job with github action."